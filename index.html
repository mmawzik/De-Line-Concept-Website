<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>De Line — Custom Furniture Sourcing &amp; Manufacturing | Foshan</title>
    <meta name="description" content="De Line takes your furniture design and makes it real — translating it into shop drawings and manufacturing it in Foshan through a trusted, growing network of factories. From luxury residences to large-scale hospitality projects, with on-the-ground QA and consolidated shipping." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#161b22" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f0e9" media="(prefers-color-scheme: light)" />
    <style>html, body { height: 100%; margin: 0; } #root { min-height: 100%; }</style>
    <script>
      // Brand-locked appearance: always dark theme + Forest palette.
      // Set before paint (plus the visitor's saved language) to avoid a flash.
      (function () {
        document.documentElement.setAttribute("data-theme", "dark");
        document.documentElement.setAttribute("data-palette", "forest");
        try {
          var l = localStorage.getItem("deline-lang");
          document.documentElement.setAttribute("lang", l === "ru" || l === "zh" ? l : "en");
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
