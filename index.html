<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>De Line — Custom Furniture Sourcing &amp; Manufacturing | Guangzhou</title>
    <meta name="description" content="De Line takes your furniture design and makes it real — translating it into shop drawings and manufacturing it in Guangzhou through a trusted, growing network of factories. From luxury residences to large-scale hospitality projects, with on-the-ground QA and consolidated shipping." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#161b22" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f0e9" media="(prefers-color-scheme: light)" />
    <style>html, body { height: 100%; margin: 0; } #root { min-height: 100%; }</style>
    <script>
      // Set theme + language before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("deline-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
          var l = localStorage.getItem("deline-lang");
          document.documentElement.setAttribute("lang", l === "ru" ? "ru" : "en");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
